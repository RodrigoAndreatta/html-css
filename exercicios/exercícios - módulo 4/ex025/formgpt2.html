<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <!-- Desafio 2 - Monte um formulário de cadastro contendo: Nome-Data de Nascimento-Telefone-Campo para upload de foto-Checkbox para aceitar os termos -->
    <h1>Exercícios de Formulários</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Cadastro</legend>
            <p>Os campos que contém * são obrigatórios</p>
            <p>
                <label for="inome">Nome completo: </label>
                <input type="text" name="nome" id="inome" min="5" max="30" required>*
            </p>

            <p>
                <label for="inasc">Data de Nascimento: </label>
                <input type="date" name="nasc" id="inasc" required value="2026-07-19">*
            </p>

            <p>
                <label for="itel">Seu telefone:</label>
                <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="^\(\d{2}\)\d{4-5}-\d{4}$" required placeholder="(xx)xxxx-xxxx">*
            </p>

            <p>
                <label for="ifoto">Sua foto de perfil: </label>
                <input type="file" name="foto" id="ifoto">
            </p>

            <p>
                <label for="itermos">Clique aqui para aceitar os <a href="termos.pdf" target="_blank">termos</a></label>
                <input type="checkbox" name="termos" id="itermos" required>*
            </p>
        </fieldset>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
