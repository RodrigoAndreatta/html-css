<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagem Flexível</title>
  </head>
  <body>
    <h1>Imagem Flexível</h1>
    <p>
      Você está vendo a imagem completa? Experimente ampliar o tamanho da sua
      janela para aproveitar a melhor experiência 🤯
    </p>
    <picture>
      <source
        media="(max-width: 1000px)"
        srcset="imgs/foto-p.jpg"
        type="image/jpg"
      />
      <source
        media="(max-width: 1500px)"
        srcset="imgs/foto-m.jpg"
        type="image/jpg"
      />
      <img src="imgs/foto-g.jpg" alt="A imagem flexível funciona" />
    </picture>
  </body>
</html>
